apiVersion: camel.apache.org/v1alpha1
kind: Kamelet
metadata:
  name: k-techpivot-xml
  labels:
    camel.apache.org/kamelet.type: "action"

spec:
  definition:
    title: "TechPivot XML Generator/Updater"
    description: |-
      Génère un nouveau XML TechnicalPivot OU met à jour un XML existant
      à partir des variables dans les headers Camel, notamment FlowDataJson
    type: object
    properties:
      operation:
        title: Operation
        description: "Type d'opération: generate (nouveau XML) ou update (mettre à jour XML existant)"
        type: string
        enum: ["generate", "update"]
        default: "generate"
      
      xmlOutputHeader:
        title: XML Output Header
        description: "Nom du header où placer le XML généré/mis à jour"
        type: string
        default: "TechPivotXml"
        
      existingXmlHeader:
        title: Existing XML Header
        description: "Nom du header contenant le XML existant (pour operation=update)"
        type: string
        default: "existingTechPivotXml"
        
      useFlowDataJson:
        title: Use FlowData JSON
        description: "Whether to use FlowData JSON from headers for generation"
        type: boolean
        default: true
        
      flowDataJsonHeader:
        title: FlowData JSON Header
        description: "Nom du header contenant le FlowData JSON"
        type: string
        default: "RefFlowData"

  dependencies:
    - "camel:groovy"
    - "camel:kamelet"

  template:
    from:
      uri: "kamelet:source"
      steps:
        # Log du démarrage avec l'opération
        - log:
            message: "TechPivot XML {{operation}} operation started"
            loggingLevel: INFO
        - log:
            message: "Step 1: About to start Groovy script"
            loggingLevel: INFO

        # Script principal pour génération/mise à jour XML avec gestion d'erreur au niveau route
        - doTry:
            steps:
              - script:
                  groovy: |
                      
                      def operation = "{{operation}}"
                      def xmlOutputHeader = "{{xmlOutputHeader}}"
                      def existingXmlHeader = "{{existingXmlHeader}}"
                      def useFlowDataJson = "{{useFlowDataJson}}" == "true"
                      
                      def headers = exchange.in?.headers ?: [:]
                      println("Processing operation: ${operation}")
                      
                      def flowDataJsonText = null
                      if (useFlowDataJson) {
                        def headerValue = headers.get("RefFlowData")
                        if (headerValue) {
                          flowDataJsonText = headerValue
                        } else if (exchange.in?.body) {
                          flowDataJsonText = exchange.in.body
                        }
                      }
                      
                      def flowOccurId = headers.get("FlowOccurId")
                      def receivedTimestamp = headers.get("ReceivedTimestamp") ?: headers.get("ProcessingTimestamp")
                      def messageId = headers.get("MessageId") ?: ""
                      def correlationId = headers.get("CorrelationId")
                      
                      def processingMode = headers.get("ProcessingMode") ?: "NORMAL"
                      def businessStatus = headers.get("BusinessStatus") ?: "PENDING"
                      def technicalStatus = headers.get("TechnicalStatus") ?: "PROCESSING"
                      
                      
                      def flowDataJson = null
                      if (flowDataJsonText) {
                        if (flowDataJsonText instanceof Map) {
                          println("FlowDataJson is already a Map, using directly")
                          flowDataJson = flowDataJsonText
                        } else {
                          println("FlowDataJson is a String, parsing as JSON")
                          def jsonSlurper = new groovy.json.JsonSlurper()
                          flowDataJson = jsonSlurper.parseText(flowDataJsonText.toString())
                        }
                      }
                      
                      def xmlContent = null
                      if (operation == "update") {
                        def existingXmlText = headers.get(existingXmlHeader)
                        println("Pass-through existing XML for update")
                        xmlContent = existingXmlText.toString()
                      } else {
                        println("Generating new XML (direct concat)...")
                        def xml = '<TechnicalPivot>'
                        xml += '<FlowOccurId>' + (flowOccurId ?: '') + '</FlowOccurId>'
                        xml += '<ProcessingTimestamp>' + receivedTimestamp + '</ProcessingTimestamp>'
                        xml += '<MessageId>' + (messageId ?: '') + '</MessageId>'
                        xml += '<CorrelationId>' + (correlationId ?: '') + '</CorrelationId>'
                        xml += '<ProcessingMode>' + processingMode + '</ProcessingMode>'
                        xml += '<BusinessStatus>' + businessStatus + '</BusinessStatus>'
                        xml += '<TechnicalStatus>' + technicalStatus + '</TechnicalStatus>'
                        if (flowDataJson?.flow) {
                          def flow = flowDataJson.flow
                          xml += '<FlowID>' + (flow.FlowID ?: '') + '</FlowID>'
                          xml += '<FlowCode>' + (flow.flowCode ?: '') + '</FlowCode>'
                          xml += '<FlowName>' + (flow.flowName ?: '') + '</FlowName>'
                          xml += '<FlowDirection>' + (flow.flowDirection ?: '') + '</FlowDirection>'
                          xml += '<FlowTypeName>' + (flow.flowTypeName ?: '') + '</FlowTypeName>'
                          xml += '<FlowEnabled>' + (flow.flowEnabled ?: '') + '</FlowEnabled>'
                        }
                        xml += '</TechnicalPivot>'
                        xmlContent = xml
                      }
                      
                      exchange.in.setBody(xmlContent)
                      exchange.in.setHeader(xmlOutputHeader, xmlContent)
                      println("${operation} operation completed, XML placed in header '${xmlOutputHeader}'")
            doCatch:
              - exception: java.lang.Exception
                steps:
                  - log:
                      message: "TechPivot XML error: ${exception.message}"
                      loggingLevel: ERROR
            doFinally:
              steps:
                - log:
                    message: "TechPivot XML {{operation}} operation completed successfully"

        # Log de fin
        - log:
            message: "TechPivot XML {{operation}} operation completed successfully"