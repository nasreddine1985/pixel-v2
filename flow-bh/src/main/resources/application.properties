# ================================================================
# PIXEL-V2 BH (Bahrain WPS) Application Configuration
# ================================================================

# ================================================================
# SERVER & SPRING BOOT CONFIGURATION
# ================================================================
server.port=8081
server.shutdown=graceful
spring.application.name=pixel-bh-app
spring.main.banner-mode=console
spring.output.ansi.enabled=always

# ================================================================
# CAMEL CORE CONFIGURATION
# ================================================================
camel.springboot.name=pixel-bh-camel-context
camel.springboot.jmx-enabled=true
camel.springboot.jmx-management-name-pattern=#name#
camel.springboot.load-type-converters=true
camel.springboot.type-conversion=true
camel.springboot.auto-startup=true
camel.springboot.shutdown-timeout=60
camel.springboot.xml-routes=false
camel.springboot.xml-rests=false
camel.dsl.yaml.enabled=true

# Camel JMX Management
camel.jmx.enabled=true
camel.jmx.mask=false
camel.jmx.include-host-name=true
camel.management.enabled=true

# ================================================================
# CAMEL HEALTH CHECK CONFIGURATION
# ================================================================
camel.health.enabled=true
camel.health.config.enabled=true
camel.health.indicator-enabled=true
camel.health.exclude-pattern=kafka*
camel.component.kafka.health-check-enabled=false
camel.main.health-check-registry-enabled=false

# ================================================================
# KAFKA CONFIGURATION
# ================================================================
# Kafka Component Configuration
camel.component.kafka.brokers=${CAMEL_COMPONENT_KAFKA_BROKERS:localhost:9092}
camel.component.kafka.health-check-consumer-enabled=false
camel.component.kafka.health-check-producer-enabled=false

# Kafka Consumer Properties
camel.component.kafka.consumer-properties[enable.auto.commit]=true
camel.component.kafka.consumer-properties[auto.commit.interval.ms]=1000
camel.component.kafka.consumer-properties[session.timeout.ms]=30000
camel.component.kafka.consumer-properties[key.deserializer]=org.apache.kafka.common.serialization.StringDeserializer
camel.component.kafka.consumer-properties[value.deserializer]=org.apache.kafka.common.serialization.StringDeserializer
camel.component.kafka.consumer-properties[auto.offset.reset]=latest

# Kafka Additional Properties
camel.component.kafka.configuration.additional-properties[client.rack]=
camel.component.kafka.configuration.additional-properties[allow.auto.create.topics]=false
spring.kafka.consumer.properties.security.protocol=PLAINTEXT
spring.kafka.consumer.properties.enable.idempotence=false

# KAFKA TOPICS CONFIGURATION
pixel.kafka.log.topic-name=BHWPS-log-event-topic
pixel.kafka.error.log.topic-name=BHWPS-error-event-topic
pixel.kafka.flow-summary.topic-name=BHWPS-flow-summary-topic
pixel.kafka.distribution.topic-name=BHWPS-distribution-topic
pixel.kafka.brokers=kafka:29092
pixel.kafka.groupId=bh
pixel.kafka.offsetReset=latest

# ================================================================
# CAMEL COMPONENTS CONFIGURATION
# ================================================================
camel.component.kamelet.location=classpath:kamelets

# ================================================================
# DATABASE & JPA CONFIGURATION
# ================================================================
# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/pixelv2
spring.datasource.username=pixelv2
spring.datasource.password=pixelv2_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ================================================================
# WPS BAHRAIN SPECIFIC CONFIGURATION
# ================================================================
# WPS HTTP Server Configuration
pixel.wps.port=8081
pixel.wps.host=0.0.0.0

# WPS Benefit System Configuration
pixel.wps.benefit.host=${WPS_BENEFIT_HOST:localhost}
pixel.wps.benefit.port=${WPS_BENEFIT_PORT:8082}

# ATLAS2 Configuration (for account validation)
pixel.atlas2.host=${ATLAS2_HOST:localhost}
pixel.atlas2.port=${ATLAS2_PORT:8083}

# DOME Configuration (for payment processing)
pixel.dome.host=${DOME_HOST:localhost}
pixel.dome.port=${DOME_PORT:8084}

# EFTS Bahrain Configuration
pixel.efts.host=${EFTS_HOST:localhost}
pixel.efts.port=${EFTS_PORT:8085}

# ================================================================
# NAS ARCHIVE CONFIGURATION
# ================================================================
pixel.nas.bh.archive.path=/opt/nas/BH/ARCHIVE
pixel.nas.bh.in.path=/opt/nas/BH/IN
pixel.nas.bh.out.path=/opt/nas/BH/OUT
pixel.nas.shared.smb.url=file:///opt/nas/shared
pixel.nas.data.smb.url=file:///opt/nas/data

# ================================================================
# REFERENTIAL SERVICE CONFIGURATION
# ================================================================
pixel.referential.service.url=http://localhost:8090/api
pixel.referential.service.timeout=5000

# ================================================================
# FLOW CONFIGURATION
# ================================================================
pixel.flow.code=BHWPS
pixel.flow.name=Bahrain WPS Payment Processing
pixel.flow.direction=BIDIRECTIONAL
pixel.flow.enabled=true

# ================================================================
# CACHE CONFIGURATION
# ================================================================
pixel.cache.type=caffeine
pixel.cache.ttl=3600
pixel.cache.max.size=10000

# ================================================================
# DUPLICATE CHECK CONFIGURATION
# ================================================================
pixel.duplicate.check.disable=false
pixel.duplicate.check.max.file.size.disable=false
pixel.duplicate.check.max.retry=3
pixel.duplicate.check.retry.sleep=1000
pixel.datasource.name=dataSource

# ================================================================
# SPRING ACTUATOR CONFIGURATION
# ================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,camelroutes
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ================================================================
# HAWTIO CONFIGURATION
# ================================================================
hawtio.authenticationEnabled=false
management.endpoint.hawtio.enabled=true
management.endpoints.web.base-path=/actuator

# ================================================================
# LOGGING CONFIGURATION
# ================================================================
logging.level.root=INFO
logging.level.com.pixel.v2=DEBUG
logging.level.org.apache.camel=INFO
logging.level.org.springframework=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
